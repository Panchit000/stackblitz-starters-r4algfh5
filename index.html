<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla CONMEBOL 2026</title>
<style>
  :root{
    --pitch:#0d3b2e; --pitch-deep:#082a20; --pitch-line:#124a39;
    --chalk:#eef2ea; --chalk-dim:#c7d2c8; --gold:#c9a227; --gold-bright:#e7c65a;
    --ink:#0a1712; --line:rgba(238,242,234,.14); --red:#b23a2e;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{font-family:var(--sans);color:var(--chalk);background:repeating-linear-gradient(180deg,rgba(255,255,255,.015) 0 2px,transparent 2px 60px),linear-gradient(180deg,var(--pitch-deep),var(--pitch) 40%,var(--pitch-deep));min-height:100vh;}
  .shell{max-width:1100px;margin:0 auto;padding:20px 16px 80px;}
  .hero{padding:28px 4px 10px;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-bright);opacity:.85;}
  h1{font-size:clamp(28px,5vw,44px);line-height:1.02;margin:6px 0 4px;font-weight:800;letter-spacing:-.01em;text-transform:uppercase;background:linear-gradient(180deg,var(--chalk),var(--chalk-dim));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .sub{color:var(--chalk-dim);font-size:14.5px;max-width:620px;margin:0 0 18px;}
  .ladder{display:flex;align-items:flex-end;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;margin-bottom:22px;overflow-x:auto;}
  .rung{flex:1;text-align:center;position:relative;padding:0 6px;white-space:nowrap;}
  .rung:not(:last-child)::after{content:"";position:absolute;right:0;top:50%;width:1px;height:22px;background:var(--line);transform:translateY(-50%);}
  .rung .name{display:block;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;color:var(--chalk-dim);}
  .rung .mult{display:block;font-weight:800;color:var(--gold);font-family:var(--mono);}
  .rung:nth-child(1) .name{font-size:10px;} .rung:nth-child(1) .mult{font-size:15px;opacity:.55;}
  .rung:nth-child(2) .name{font-size:10.5px;} .rung:nth-child(2) .mult{font-size:18px;opacity:.7;}
  .rung:nth-child(3) .name{font-size:11px;} .rung:nth-child(3) .mult{font-size:22px;opacity:.85;color:var(--gold-bright);}
  .rung:nth-child(4) .name{font-size:12px;} .rung:nth-child(4) .mult{font-size:28px;color:var(--gold-bright);text-shadow:0 0 14px rgba(231,198,90,.5);}
  /* IDENTITY BAR */
  .me-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:18px;}
  .me-bar .tag{font-size:12px;color:var(--chalk-dim);flex:1 1 100%;}
  .me-bar .whoami{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .me-bar .whoami b{color:var(--gold-bright);}
  .field-group{display:flex;flex-direction:column;gap:3px;}

  .field-group input{background:var(--ink);border:1px solid var(--line);color:var(--chalk);padding:7px 10px;border-radius:7px;font-size:14px;min-width:150px;}
  /* TABS */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .tab{font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;background:transparent;border:1px solid var(--line);color:var(--chalk-dim);padding:9px 14px;border-radius:999px;cursor:pointer;transition:.15s;}
  .tab:hover{border-color:var(--gold);color:var(--chalk);}
  .tab.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700;}
  /* TOURNAMENT TOGGLE */
  .tsel{display:flex;gap:8px;margin-bottom:18px;}
  .tsel button{flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.15);color:var(--chalk-dim);cursor:pointer;font-weight:700;letter-spacing:.02em;}
  .tsel button.on{background:linear-gradient(180deg,var(--pitch-line),rgba(0,0,0,.1));border-color:var(--gold);color:var(--chalk);box-shadow:inset 0 0 0 1px rgba(201,162,39,.3);}
  .tsel button small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;color:var(--gold-bright);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
  /* CARDS */
  .card{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-bright);font-family:var(--mono);}
  .card .hint{color:var(--chalk-dim);font-size:12.5px;margin:0 0 12px;}
  /* BRACKET */
  .bracket-cols{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;}
  .bcol{min-width:200px;flex:1;}
  .bcol h3{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--chalk-dim);margin:0 0 4px;}
  .bcol .dates{font-size:11px;color:var(--gold-bright);opacity:.85;margin-bottom:10px;font-family:var(--mono);}
  .series{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:16px;}
  .series .row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .series input.team{flex:1;background:var(--ink);border:1px solid var(--line);color:var(--chalk);padding:6px 8px;border-radius:6px;font-size:13px;}
  .series .vs{text-align:center;font-family:var(--mono);font-size:10px;color:var(--chalk-dim);opacity:.6;margin:2px 0;}
  /* BUTTONS */
  .btn{font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.06em;background:var(--gold);color:var(--ink);border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:700;}
  .btn:hover{background:var(--gold-bright);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--chalk-dim);}
  .btn.ghost:hover{border-color:var(--red);color:var(--chalk);}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
  /* MATCHUP */
  .matchup{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
  .matchup .match-header{margin-bottom:12px;}
  .matchup .match-title{font-weight:700;font-size:15px;margin-bottom:4px;}

  .locked .score-box,.locked select{border-color:var(--line);color:var(--chalk-dim);opacity:.7;}

  .penales{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--chalk-dim);margin-top:6px;}
  /* ADMIN */
  .phase-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;}
  .phase-row .pname{font-weight:700;min-width:180px;}
  .phase-row .pstatus{font-family:var(--mono);font-size:11px;color:var(--chalk-dim);flex:1;min-width:180px;}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;background:transparent;border:none;color:var(--chalk-dim);padding:7px 10px;cursor:pointer;}
  .seg button+button{border-left:1px solid var(--line);}
  .seg button.on{background:var(--gold);color:var(--ink);font-weight:700;}
  .auth-card{max-width:440px;}
  .readonly-note{background:rgba(178,58,46,.12);border:1px solid var(--red);color:var(--chalk);padding:10px 12px;border-radius:9px;font-size:13px;margin-bottom:14px;}
  /* TABLE */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{font-family:var(--mono);text-transform:uppercase;font-size:10.5px;letter-spacing:.06em;color:var(--gold-bright);text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px solid var(--line);color:var(--chalk);}
  tr:first-child td{font-weight:700;}
  .rank{font-family:var(--mono);color:var(--gold-bright);}
  .muted{color:var(--chalk-dim);font-size:12px;}
  .empty{padding:30px 10px;text-align:center;color:var(--chalk-dim);font-size:13.5px;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:.25s;z-index:99;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
  .rules-list{padding-left:18px;margin:6px 0;}
  .rules-list li{margin-bottom:6px;line-height:1.5;color:var(--chalk-dim);font-size:13.5px;}
  .rules-list b{color:var(--chalk);}
  code.k{font-family:var(--mono);background:rgba(0,0,0,.25);padding:1px 6px;border-radius:5px;color:var(--gold-bright);}
  footer{margin-top:30px;padding-top:14px;border-top:1px solid var(--line);color:var(--chalk-dim);font-size:11.5px;text-align:center;}
  @media(max-width:640px){.bracket-cols{flex-direction:column;}.bcol{min-width:0;}.matchup .match-legs{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="shell" id="app">Cargando…</div>
<div class="toast" id="toast"></div>

<!-- Supabase (para sincronizar datos entre todos los dispositivos). Si no está configurado, la app sigue funcionando en modo "solo este dispositivo". -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
/* =====================================================================
   ☁️ CONFIGURACIÓN DE SUPABASE — PEGÁ ACÁ TUS DATOS
   ¿Cómo obtenerlos? Seguí la guía "guia-supabase-sincronizacion.md" que
   te entregué junto con este archivo. Resumen:
     1. https://supabase.com → Crear proyecto (gratis)
     2. SQL Editor → correr el script de creación de tabla de la guía
     3. Project Settings → API → copiar "Project URL" y "anon public key"
     4. Pegarlos abajo, reemplazando los dos valores de ejemplo.
   Mientras esto diga "TU_PROJECT_URL", la app funciona SOLO en este
   dispositivo (localStorage) y por eso cada persona ve datos distintos.
   ===================================================================== */
const SUPABASE_URL = "https://jcrnubgodxrajfazualt.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_sO7uNy0Ps0h3Amd7Ys0ojQ_X_OhSnx2";
const SUPABASE_TABLE = "kv_store";

/* =====================================================================
   STORAGE — capa unificada:
   - CACHE: copia en memoria de TODOS los datos (clave -> valor string)
   - Si Supabase está configurado: CACHE se sincroniza en vivo con la nube
     (vía Supabase Realtime), así que un cambio de cualquier persona se ve
     reflejado en todos los dispositivos conectados, casi en tiempo real.
   - Si Supabase NO está configurado: se usa localStorage como respaldo
     (comportamiento "solo este dispositivo").
   ===================================================================== */
const MEM = {};
let CACHE = {};
let cloudEnabled = false;
let sb = null;
let appBooted = false;

function isCloudConfigured(){
  return SUPABASE_URL && SUPABASE_URL.indexOf("TU_PROJECT_URL")===-1 && SUPABASE_URL.length>10
      && SUPABASE_ANON_KEY && SUPABASE_ANON_KEY.indexOf("TU_ANON_KEY")===-1 && SUPABASE_ANON_KEY.length>10;
}

function rawLsGet(key){ try{ return localStorage.getItem(key); }catch(e){ return MEM[key]||null; } }
function rawLsSet(key,val){ try{ localStorage.setItem(key,val); }catch(e){ MEM[key]=val; } }
function rawLsDel(key){ try{ localStorage.removeItem(key); }catch(e){ delete MEM[key]; } }
function rawLsKeys(prefix){
  const out=[];
  try{
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith(prefix)) out.push(k);
    }
  }catch(e){
    Object.keys(MEM).forEach(k=>{ if(k.startsWith(prefix)) out.push(k); });
  }
  return out;
}

// Estas 4 funciones son las que usa el resto de la app (misma firma de siempre).
function lsGet(key){
  if(Object.prototype.hasOwnProperty.call(CACHE,key)) return CACHE[key];
  return rawLsGet(key);
}
function lsSet(key,val){
  CACHE[key]=val;
  rawLsSet(key,val); // respaldo local siempre, aunque haya Supabase
  if(cloudEnabled && sb){
    sb.from(SUPABASE_TABLE).upsert({ key, value: val }).then(({error})=>{
      if(error) console.error("Supabase upsert error", key, error);
    });
  }
}
function lsDel(key){
  delete CACHE[key];
  rawLsDel(key);
  if(cloudEnabled && sb){
    sb.from(SUPABASE_TABLE).delete().eq("key",key).then(({error})=>{
      if(error) console.error("Supabase delete error", key, error);
    });
  }
}
function lsKeys(prefix){
  const set=new Set();
  Object.keys(CACHE).forEach(k=>{ if(k.startsWith(prefix)) set.add(k); });
  rawLsKeys(prefix).forEach(k=>set.add(k));
  return Array.from(set);
}

/* ¿El usuario está en medio de escribir algo (un input/select con foco dentro
   del contenido de la pestaña)? Si es así, no lo interrumpimos con un re-render
   automático cuando llega un cambio remoto de otra persona. */
function isUserEditing(){
  const el=document.activeElement;
  const tabContent=document.getElementById("tabContent");
  return !!(el && tabContent && tabContent.contains(el) && (el.tagName==="INPUT"||el.tagName==="SELECT"));
}

/* Vuelve a poblar el STATE (brackets, resultados, estado de fases) desde
   la CACHE actual — se usa al iniciar y cada vez que llega un cambio remoto. */
function refreshStateFromStorage(){
  STATE.brackets.CL=loadBracket("CL");
  STATE.brackets.CS=loadBracket("CS");
  STATE.results.CL=loadResults("CL");
  STATE.results.CS=loadResults("CS");
  STATE.phaseStatus.CL=loadPhaseStatus("CL");
  STATE.phaseStatus.CS=loadPhaseStatus("CS");
}

function bootApp(){
  if(appBooted) return;
  appBooted=true;
  const sess=lsGet("session");
  if(sess){ try{ const s=JSON.parse(sess); if(s&&s.name){ STATE.me=s.name; STATE.loggedIn=true; } }catch(e){} }
  STATE.isAdmin=lsGet("adminSession")==="1";
  refreshStateFromStorage();
  STATE.allPreds={};
  render();
}

async function initCloud(){
  if(!isCloudConfigured()){
    cloudEnabled=false;
    bootApp();
    return;
  }
  try{
    sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { data, error } = await sb.from(SUPABASE_TABLE).select("key,value");
    if(error) throw error;
    const remote={};
    (data||[]).forEach(row=>{ remote[row.key]=row.value; });
    // La nube manda: lo que ya exista ahí pisa lo que hubiera solo local.
    CACHE=Object.assign({}, CACHE, remote);
    cloudEnabled=true;
    bootApp();
    // A partir de acá, cualquier cambio (propio o de otra persona) llega en vivo
    // vía Supabase Realtime (requiere tener la réplica activada — ver la guía).
    sb.channel("kv-changes")
      .on("postgres_changes", { event:"*", schema:"public", table:SUPABASE_TABLE }, payload=>{
        if(payload.eventType==="DELETE"){
          delete CACHE[payload.old.key];
        }else{
          CACHE[payload.new.key]=payload.new.value;
        }
        if(!appBooted) return;
        if(isUserEditing()) return; // no interrumpir a alguien que está tipeando
        refreshStateFromStorage();
        render();
      })
      .subscribe();
  }catch(e){
    console.error("No se pudo conectar a Supabase, usando modo local:",e);
    cloudEnabled=false;
    bootApp();
  }
}

/* =====================================================================
   CONFIGURACIÓN DE TORNEOS Y RONDAS
   ===================================================================== */
const TOURNEYS = {
  CL:{

    label:"Copa Libertadores", short:"Libertadores",
    rounds:[
      {key:"octavos",   label:"Octavos de Final",  mult:1,    n:8, vuelta:true,  dates:{ida:"11–13 de agosto 2026",        vuelta:"18–20 de agosto 2026"},        startDate:"2026-08-11"},
      {key:"cuartos",   label:"Cuartos de Final",   mult:1.25, n:4, vuelta:true,  dates:{ida:"8–10 de septiembre 2026",     vuelta:"15–17 de septiembre 2026"},    startDate:"2026-09-08"},
      {key:"semifinal", label:"Semifinal",           mult:1.5,  n:2, vuelta:true,  dates:{ida:"14–15 de octubre 2026",       vuelta:"21–22 de octubre 2026"},        startDate:"2026-10-14"},
      {key:"final",     label:"Final",               mult:2,    n:1, vuelta:false, dates:{unico:"28 de noviembre 2026 · Estadio Centenario, Montevideo"},            startDate:"2026-11-28"}
    ]
  },
  CS:{
    label:"Copa Sudamericana", short:"Sudamericana",
    rounds:[
      {key:"previa",    label:"Fase Previa",         mult:1,    n:8, vuelta:true,  dates:{ida:"21–23 de julio 2026",         vuelta:"28–30 de julio 2026"},          startDate:"2026-07-21"},
      {key:"octavos",   label:"Octavos de Final",    mult:1,    n:8, vuelta:true,  dates:{ida:"11–13 de agosto 2026",        vuelta:"18–20 de agosto 2026"},         startDate:"2026-08-11"},
      {key:"cuartos",   label:"Cuartos de Final",    mult:1.25, n:4, vuelta:true,  dates:{ida:"8–10 de septiembre 2026",     vuelta:"15–17 de septiembre 2026"},     startDate:"2026-09-08"},
      {key:"semifinal", label:"Semifinal",            mult:1.5,  n:2, vuelta:true,  dates:{ida:"13–14 de octubre 2026",       vuelta:"20–21 de octubre 2026"},        startDate:"2026-10-13"},
      {key:"final",     label:"Final",                mult:2,    n:1, vuelta:false, dates:{unico:"21 de noviembre 2026 · Estadio Metropolitano, Barranquilla"},       startDate:"2026-11-21"}
    ]
  }
};
const TAB_KEYS = ["cuadro","pronosticar","resultados","tabla","reglas","admin"];

/* =====================================================================
   SEEDS Y LLAVES OFICIALES
   ===================================================================== */
const CL_SEEDS = {
  1:"Flamengo",2:"Independiente Rivadavia",3:"Independiente del Valle",4:"Universidad Católica",
  5:"Cerro Porteño",6:"Liga de Quito",7:"Corinthians",8:"Coquimbo Unido",
  9:"Rosario Central",10:"Mirassol",11:"Palmeiras",12:"Cruzeiro",
  13:"Platense",14:"Estudiantes (LP)",15:"Deportes Tolima",16:"Fluminense"
};
// Par [loSeed, hiSeed] — hi juega de local en la IDA, lo de local en la VUELTA
const CL_OCTAVOS_PAIRS = [[4,14],[7,9],[1,12],[3,15],[6,10],[5,11],[8,13],[2,16]];

const CS_SEEDS = {
  1:"Botafogo",2:"River Plate",3:"Montevideo City Torque",4:"Olimpia",5:"São Paulo",
  6:"Macará",7:"Atlético Mineiro",8:"Recoleta",9:"Grêmio",10:"Bragantino",
  11:"Vasco da Gama",12:"O'Higgins",13:"Tigre",14:"Caracas",15:"Cienciano",
  16:"Santos",17:"Universidad Central",18:"Lanús",19:"Santa Fe",20:"Nacional",
  21:"Boca Juniors",22:"Independiente Medellín",23:"Sporting Cristal",24:"Bolívar"
};
const CS_PREVIA_PAIRS = [[12,21],[9,24],[14,19],[11,22],[10,23],[16,17],[13,20],[15,18]];
// Seed clasificado directo a Octavos que espera al ganador de cada llave de la Fase Previa
const CS_PREVIA_FACES = [8,5,2,4,7,6,3,1];

/* Convierte un par [lo,hi] en objeto {home, away, homeSeed, awaySeed}
   donde home = el de seed más alto (juega de local en la IDA). */
function buildSeries(loSeed, hiSeed, seedsMap){
  return { home:seedsMap[hiSeed]||"", away:seedsMap[loSeed]||"", homeSeed:hiSeed, awaySeed:loSeed };
}
function buildSeedSeries(pairs, seedsMap){
  return pairs.map(([a,b])=>{
    const hi=Math.max(a,b), lo=Math.min(a,b);
    return buildSeries(lo, hi, seedsMap);
  });
}

function defaultBracket(t){
  const b={};
  TOURNEYS[t].rounds.forEach(r=>{
    b[r.key]=Array.from({length:r.n},(_,i)=>({id:i,home:"",away:"",homeSeed:null,awaySeed:null}));
  });
  if(t==="CL"){
    buildSeedSeries(CL_OCTAVOS_PAIRS,CL_SEEDS).forEach((s,i)=>{ b.octavos[i]={id:i,...s}; });
  }
  if(t==="CS"){
    buildSeedSeries(CS_PREVIA_PAIRS,CS_SEEDS).forEach((s,i)=>{ b.previa[i]={id:i,...s}; });
    CS_PREVIA_FACES.forEach((topSeed,i)=>{
      b.octavos[i]={id:i,home:"",away:CS_SEEDS[topSeed],homeSeed:null,awaySeed:topSeed};
    });
  }
  return b;
}

function phaseLocked(round){
  if(!round.startDate) return false;
  return new Date()>=new Date(round.startDate+"T00:00:00");
}
function isRoundLocked(t,round){
  const status=(STATE.phaseStatus[t]||{})[round.key]||"auto";
  if(status==="open") return false;
  if(status==="closed") return true;
  return phaseLocked(round);
}
function roundStatusLabel(t,round){
  const status=(STATE.phaseStatus[t]||{})[round.key]||"auto";
  if(status==="open") return "🟢 Forzada ABIERTA por el admin";
  if(status==="closed") return "🔒 Forzada CERRADA por el admin";
  return phaseLocked(round)?"🔒 Cerrada (ya comenzó)":"🟢 Abierta (según fecha)";
}

/* =====================================================================
   AUTENTICACIÓN DE USUARIOS
   Solo nombre + contraseña. El "nombre" es el identificador público en rankings.
   ===================================================================== */
function slug(name){
  return (name||"").trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"")||"anon";
}

/* ======================= GANADOR DE UNA LLAVE ======================= */
function winnerOf(t,roundKey,seriesId){
  const s=(STATE.brackets[t][roundKey]||[]).find(x=>x.id===seriesId);
  const act=(STATE.results[t]||{})[roundKey+"-"+seriesId];
  if(!s||!act||!act.clasificado) return null;
  if(act.clasificado===s.home) return {name:s.home,seed:s.homeSeed};
  if(act.clasificado===s.away) return {name:s.away,seed:s.awaySeed};
  return {name:act.clasificado,seed:null};
}

/* =====================================================================
   PUNTUACIÓN
   ===================================================================== */
function matchPoints(ph,pa,ah,aa){
  if(ph==null||pa==null||ah==null||aa==null) return 0;
  if(ph===ah&&pa===aa) return 8; // marcador exacto
  const sgn=x=>x>0?1:(x<0?-1:0);
  if(sgn(ph-pa)===sgn(ah-aa)) return 4; // ganador/empate correcto
  if((ph-pa)===(ah-aa)) return 2; // misma diferencia de goles (sin ganador correcto)
  return 0;
}
/* Entrega el puntaje de lo que YA esté cargado, sin esperar a que la llave esté
   completa: si solo está la ida, da los puntos de la ida; si después carga la
   vuelta, suma esos también; el bonus de llave perfecta solo se agrega cuando
   los tres datos (ida, vuelta y clasificado) están completos y son correctos. */
function scoreSeries(round,pred,act){
  if(!pred||!act) return null;
  const out={ida:0,vuelta:0,clas:0,perfect:0,exactCount:0,diffCount:0,idaDone:false,vueltaDone:false,clasDone:false};
  if(round.vuelta){
    if(act.idaH!=null&&act.idaA!=null){
      out.ida=matchPoints(pred.idaH,pred.idaA,act.idaH,act.idaA);
      out.idaDone=true;
      if(out.ida===8) out.exactCount++;
      if(out.ida===2) out.diffCount++;
    }
    if(act.vueltaH!=null&&act.vueltaA!=null){
      out.vuelta=matchPoints(pred.vueltaH,pred.vueltaA,act.vueltaH,act.vueltaA);
      out.vueltaDone=true;
      if(out.vuelta===8) out.exactCount++;
      if(out.vuelta===2) out.diffCount++;
    }
    if(act.clasificado){
      out.clas=(pred.clasificado&&pred.clasificado.trim().toLowerCase()===act.clasificado.trim().toLowerCase())?10:0;
      out.clasDone=true;
    }
    out.perfect=(out.idaDone&&out.vueltaDone&&out.clasDone&&out.ida===8&&out.vuelta===8&&out.clas===10)?5:0;
  }else{
    if(act.unicoH!=null&&act.unicoA!=null){
      out.ida=matchPoints(pred.unicoH,pred.unicoA,act.unicoH,act.unicoA);
      out.idaDone=true;
      if(out.ida===8) out.exactCount++;
      if(out.ida===2) out.diffCount++;
    }
    if(act.clasificado){
      out.clas=(pred.clasificado&&pred.clasificado.trim().toLowerCase()===act.clasificado.trim().toLowerCase())?10:0;
      out.clasDone=true;
    }
    out.perfect=(out.idaDone&&out.clasDone&&out.ida===8&&out.clas===10)?5:0;
  }
  if(!out.idaDone&&!out.vueltaDone&&!out.clasDone) return null; // nada cargado todavía
  const base=out.ida+out.vuelta+out.clas+out.perfect;
  out.total=base*round.mult;
  out.clasOk=out.clas>0?1:0;
  return out;
}
function computeLeaderboard(t){
  const rows=(STATE.allPreds[t]||[]).map(p=>{
    let total=0,exact=0,clasOk=0,diffOk=0,semiFinalPts=0;
    TOURNEYS[t].rounds.forEach(r=>{
      (STATE.brackets[t][r.key]||[]).forEach(series=>{
        const id=r.key+"-"+series.id;
        const sc=scoreSeries(r,p.entries[id],(STATE.results[t]||{})[id]);
        if(sc){
          total+=sc.total; exact+=sc.exactCount; clasOk+=sc.clasOk; diffOk+=sc.diffCount;
          if(r.key==="semifinal"||r.key==="final") semiFinalPts+=sc.total;
        }
      });
    });
    return {name:p.displayName||"(sin nombre)",total,exact,clasOk,diffOk,semiFinalPts};
  });
  rows.sort((a,b)=>b.total-a.total||b.exact-a.exact||b.clasOk-a.clasOk||b.semiFinalPts-a.semiFinalPts||b.diffOk-a.diffOk);
  return rows;
}

function syncTabsUI(){ document.querySelectorAll(".tab").forEach((b,i)=>b.classList.toggle("active",TAB_KEYS[i]===STATE.tab)); }

function renderTab(){

   ===================================================================== */
function renderCuadro(){
  const t=STATE.tournament, bracket=STATE.brackets[t], rounds=TOURNEYS[t].rounds, admin=STATE.isAdmin;
  const cols=rounds.map(r=>{
    const dateStr=r.vuelta?`Ida: ${r.dates.ida} · Vuelta: ${r.dates.vuelta}`:r.dates.unico;
    const series=bracket[r.key].map(s=>{
      const hb=s.homeSeed!=null?` <span class="muted">#${s.homeSeed}</span>`:"";
      const ab=s.awaySeed!=null?` <span class="muted">#${s.awaySeed}</span>`:"";
      if(admin) return `<div class="series">
        <div class="row"><input class="team" data-round="${r.key}" data-id="${s.id}" data-side="home" value="${esc(s.home)}" placeholder="Local en la ida">${hb}</div>
        <div class="vs">vs (ida)</div>
        <div class="row"><input class="team" data-round="${r.key}" data-id="${s.id}" data-side="away" value="${esc(s.away)}" placeholder="Visitante en la ida">${ab}</div>
      </div>`;
      return `<div class="series">
        <div class="row"><b>${esc(s.home)||"—"}</b>${hb}</div>
        <div class="vs">vs</div>
        <div class="row"><b>${esc(s.away)||"—"}</b>${ab}</div>
      </div>`;
    }).join("");
    return `<div class="bcol"><h3>${r.label}</h3><div class="dates">${dateStr}</div>${series}</div>`;
  }).join("");
  const adminNote=admin?"":`<div class="readonly-note">Solo el administrador puede editar el cuadro. Iniciá sesión en ⚙ Admin.</div>`;
  const csPreviaBtn=(t==="CS"&&admin)?`<button class="btn ghost" onclick="advancePreviaToOctavos()">Avanzar Fase Previa → Octavos</button>`:"";
  const editControls=admin?`
    <div class="btn-row">
      <button class="btn" onclick="saveCuadro()">Guardar equipos</button>
      <button class="btn ghost" onclick="reseedOctavos()">🔄 Recargar Octavos oficiales</button>
      ${csPreviaBtn}
      <button class="btn ghost" onclick="advanceRound('octavos')">Avanzar Octavos → Cuartos</button>
      <button class="btn ghost" onclick="advanceRound('cuartos')">Avanzar Cuartos → Semifinal</button>
      <button class="btn ghost" onclick="advanceRound('semifinal')">Avanzar Semifinal → Final</button>
    </div>
    <div class="btn-row"><button class="btn ghost" onclick="resetTourney()">⚠ Reiniciar torneo</button></div>`:"";
  return `<div class="card">
    <h2>Cuadro — ${TOURNEYS[t].label}</h2>
    ${adminNote}
    <p class="hint">#N = número de seed. El equipo con seed más alto juega de local en la ida.</p>
    <div class="bracket-cols">${cols}</div>${editControls}</div>`;
}
function saveCuadro(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede editar el cuadro"); return; }
  const t=STATE.tournament, bracket=JSON.parse(JSON.stringify(STATE.brackets[t]));
  document.querySelectorAll("#tabContent input.team").forEach(inp=>{
    const r=inp.dataset.round,id=+inp.dataset.id,side=inp.dataset.side;
    const item=bracket[r].find(x=>x.id===id);
    if(item) item[side]=inp.value.trim();
  });
  saveBracket(t,bracket); toast("Equipos guardados"); renderTab();
}
const NEXT_ROUND={previa:"octavos",octavos:"cuartos",cuartos:"semifinal",semifinal:"final"};
function advanceRound(fromKey){
  if(!STATE.isAdmin){ toast("Solo el administrador puede avanzar el cuadro"); return; }
  const t=STATE.tournament, toKey=NEXT_ROUND[fromKey];
  const bracket=STATE.brackets[t], fromSeries=bracket[fromKey], toSeries=bracket[toKey];
  let missing=0;
  for(let i=0;i<toSeries.length;i++){
    const s1=fromSeries[i*2], s2=fromSeries[i*2+1];
    const w1=winnerOf(t,fromKey,s1.id), w2=winnerOf(t,fromKey,s2.id);
    if(!w1||!w2){ missing++; continue; }
    const seed1=w1.seed==null?-1:w1.seed, seed2=w2.seed==null?-1:w2.seed;
    const homeW=seed1>=seed2?w1:w2, awayW=seed1>=seed2?w2:w1;
    toSeries[i].home=homeW.name; toSeries[i].homeSeed=homeW.seed;
    toSeries[i].away=awayW.name; toSeries[i].awaySeed=awayW.seed;
  }
  if(missing) toast(`Faltan resultados de ${missing} llave(s)`);
  saveBracket(t,bracket); toast("Cuadro actualizado"); renderTab();
}
function advancePreviaToOctavos(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede avanzar el cuadro"); return; }
  const t="CS", bracket=STATE.brackets[t]; let missing=0;
  CS_PREVIA_FACES.forEach((topSeed,i)=>{
    const w=winnerOf(t,"previa",i);
    if(!w){ missing++; return; }
    const idx=bracket.octavos.findIndex(s=>s.awaySeed===topSeed);
    if(idx>=0){ bracket.octavos[idx].home=w.name; bracket.octavos[idx].homeSeed=w.seed; }
  });
  if(missing) toast(`Faltan resultados de ${missing} llave(s) de Fase Previa`);
  saveBracket(t,bracket); toast("Octavos actualizado"); renderTab();
}
function reseedOctavos(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede hacer esto"); return; }
  const t=STATE.tournament, bracket=STATE.brackets[t];
  if(t==="CL"){
    buildSeedSeries(CL_OCTAVOS_PAIRS,CL_SEEDS).forEach((s,i)=>{ bracket.octavos[i]={id:i,...s}; });
  }else{
    buildSeedSeries(CS_PREVIA_PAIRS,CS_SEEDS).forEach((s,i)=>{ bracket.previa[i]={id:i,...s}; });
    CS_PREVIA_FACES.forEach((topSeed,i)=>{ bracket.octavos[i]={id:i,home:"",away:CS_SEEDS[topSeed],homeSeed:null,awaySeed:topSeed}; });
  }
  saveBracket(t,bracket); toast("Octavos recargado con equipos oficiales"); renderTab();
}
function resetTourney(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede reiniciar el torneo"); return; }
  if(!confirm("Esto borra todos los equipos y resultados de este torneo. ¿Continuar?")) return;
  const t=STATE.tournament;
  saveBracket(t,defaultBracket(t)); saveResults(t,{}); toast("Torneo reiniciado"); renderTab();
}

/* =====================================================================

function renderPronosticar(){
  if(!STATE.loggedIn) return `<div class="card"><h2>Antes de pronosticar</h2><p class="hint">Registrate o iniciá sesión con tu nombre y contraseña arriba para cargar tus predicciones.</p></div>`;
  const t=STATE.tournament, bracket=STATE.brackets[t], results=STATE.results[t]||{};
  const myPred=loadMyPrediction(t,STATE.me);
  STATE._myPred=myPred;
  let anySeries=false;
  let html=`<div class="card"><h2>Tus pronósticos — ${TOURNEYS[t].label}</h2><p class="hint">El equipo con seed más alto juega de local en la ida y de visitante en la vuelta. Apenas se carga el resultado real de un partido, ese partido queda bloqueado y te suma los puntos — no hace falta esperar a que termine toda la llave.</p></div>`;
  TOURNEYS[t].rounds.forEach(r=>{
    const seriesList=bracket[r.key].filter(s=>s.home&&s.away);
    if(!seriesList.length) return;
    anySeries=true;
    const cards=seriesList.map(s=>{
      const id=r.key+"-"+s.id, act=results[id]||{}, pred=myPred.entries[id]||{};
      const phaseLockedNow=isRoundLocked(t,r);
      const idaLocked=phaseLockedNow||act.idaH!=null||act.unicoH!=null;
      const vueltaLocked=phaseLockedNow||act.vueltaH!=null;
      const clasLocked=phaseLockedNow||!!act.clasificado;
      const allLocked=r.vuelta?(idaLocked&&vueltaLocked&&clasLocked):(idaLocked&&clasLocked);
      const opts=`<option value="">— elegir —</option><option value="${esc(s.home)}" ${pred.clasificado===s.home?"selected":""}>${esc(s.home)}</option><option value="${esc(s.away)}" ${pred.clasificado===s.away?"selected":""}>${esc(s.away)}</option>`;

      const sc=scoreSeries(r,pred,act);

      // Ida: home (seed alto) es local; Vuelta: away (seed bajo) es local → se invierten los roles
      let legsHtml="";
      if(r.vuelta){
        legsHtml=`
          <div class="leg">
            <span class="leg-label">🏠 IDA — Local: ${esc(s.home)}${sc&&sc.idaDone?` <span style="color:var(--gold-bright)">· ${sc.ida} pts</span>`:""}</span>
            <div class="leg-teams">${esc(s.home)} vs ${esc(s.away)}</div>
            <div class="score-pair">
              <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.home.split(" ")[0])}</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="idaH" ${idaLocked?"disabled":""} value="${pred.idaH??''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="idaA" ${idaLocked?"disabled":""} value="${pred.idaA??''}">
              <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.away.split(" ")[0])}</span>
            </div>
          </div>
          <div class="leg">
            <span class="leg-label">🏠 VUELTA — Local: ${esc(s.away)}${sc&&sc.vueltaDone?` <span style="color:var(--gold-bright)">· ${sc.vuelta} pts</span>`:""}</span>
            <div class="leg-teams">${esc(s.away)} vs ${esc(s.home)}</div>
            <div class="score-pair">
              <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.away.split(" ")[0])}</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="vueltaH" ${vueltaLocked?"disabled":""} value="${pred.vueltaH??''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="vueltaA" ${vueltaLocked?"disabled":""} value="${pred.vueltaA??''}">
              <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.home.split(" ")[0])}</span>
            </div>
          </div>`;
      }else{
        legsHtml=`<div class="leg">
          <span class="leg-label">⚽ Partido único${sc&&sc.idaDone?` <span style="color:var(--gold-bright)">· ${sc.ida} pts</span>`:""}</span>
          <div class="leg-teams">${esc(s.home)} vs ${esc(s.away)}</div>
          <div class="score-pair">
            <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.home.split(" ")[0])}</span>
            <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="unicoH" ${idaLocked?"disabled":""} value="${pred.unicoH??''}">
            <span class="score-dash">–</span>
            <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="unicoA" ${idaLocked?"disabled":""} value="${pred.unicoA??''}">
            <span style="font-size:12px;color:var(--chalk-dim);min-width:30px">${esc(s.away.split(" ")[0])}</span>
          </div>
        </div>`;
      }
      let pointsPill="";
      if(sc){
        const parts=[];
        if(sc.clasDone) parts.push(`Clasificado: ${sc.clas} pts`);
        if(sc.perfect) parts.push(`Bonus llave perfecta: +${sc.perfect}`);
        pointsPill=`<div class="points-pill">Parcial: ${sc.total.toFixed(2)} pts${parts.length?` (${parts.join(" · ")})`:""}</div>`;
      }else if(phaseLockedNow){
        pointsPill=`<div class="points-pill">🔒 ${roundStatusLabel(t,r)}</div>`;
      }
      return `<div class="matchup ${allLocked?"locked":""}">
        <div class="match-header">
          <div class="match-title">${esc(s.home)} <span style="color:var(--chalk-dim);font-size:12px;font-weight:400">vs</span> ${esc(s.away)}</div>
          <div style="font-family:var(--mono);font-size:11px;color:var(--chalk-dim)">
            ${s.homeSeed!=null?`Seed #${s.homeSeed}`:""}${s.homeSeed!=null&&s.awaySeed!=null?" · ":""}${s.awaySeed!=null?`Seed #${s.awaySeed}`:""}
          </div>
        </div>
        ${legsHtml}
        <div class="leg"><span class="leg-label">¿Quién clasifica?</span>
          <select class="clas pinp" data-id="${id}" data-field="clasificado" ${clasLocked?"disabled":""}>${opts}</select>
        </div>

      </div>`;
    }).join("");
    html+=`<div class="card"><h2>${r.label}</h2>${cards}</div>`;
  });
  if(!anySeries) html+=`<div class="empty">Todavía no hay equipos cargados en el cuadro.</div>`;
  else html+=`<div class="btn-row"><button class="btn" onclick="saveMyPreds()">Guardar mis pronósticos</button></div>`;

}
function saveMyPreds(){
  if(!STATE.loggedIn){ toast("Iniciá sesión primero"); return; }
  const t=STATE.tournament, myPred=STATE._myPred||{displayName:STATE.me,entries:{}};
  myPred.displayName=STATE.me;
  document.querySelectorAll("#tabContent .pinp").forEach(inp=>{
    const id=inp.dataset.id, field=inp.dataset.field;
    if(!myPred.entries[id]) myPred.entries[id]={};
    if(inp.tagName==="SELECT") myPred.entries[id][field]=inp.value||null;
    else myPred.entries[id][field]=inp.value===""?null:parseInt(inp.value,10);
  });
  saveMyPrediction(t,STATE.me,myPred); toast("Pronósticos guardados"); renderTab();
}

    <div style="overflow-x:auto;margin-top:10px">
      <table><thead><tr><th>Jugador</th><th>Contraseña</th><th>Estado</th></tr></thead>
      <tbody>${STATE._seedResult.map(r=>`<tr><td><b>${esc(r.name)}</b></td><td class="muted" style="font-family:var(--mono)">${esc(r.password)}</td><td class="muted">${r.isNew?"🆕 cuenta creada":"ya existía (contraseña sin cambios)"}</td></tr>`).join("")}</tbody></table>
    </div>
    <p class="hint" style="margin-top:8px">Copiá esta tabla y enviale a cada jugador su nombre y contraseña por el medio que prefieras (WhatsApp, etc). Esta tabla no vuelve a mostrarse sola — si la cerrás, para recuperar una contraseña usá "Restablecer contraseña de un participante".</p>
  ` : "";
  return `<div class="card">
    <h2>Precargar jugadores y apuestas (Fase Previa — Sudamericana)</h2>
    <p class="hint">Como la competencia ya arrancó, esto crea de una vez a los 11 jugadores predefinidos con sus apuestas ya cargadas para las 8 llaves de la Fase Previa de Sudamericana, y genera una contraseña para cada uno (si ya existían, no se les cambia la contraseña).</p>
    <button class="btn" onclick="seedPreviaPredictions()">Precargar jugadores y apuestas</button>
    ${seedTable}
  </div>`;
}
function renderAdminUserList(){
  const users=allUsersList();
  const rows=users.map(u=>`
    <div class="phase-row">
      <div class="pname">${esc(u.name)}</div>
      <div class="pstatus">Registrado</div>
      <button class="btn ghost" onclick="adminDeleteUser('${esc(u.name).replace(/'/g,"\\'")}')">🗑 Eliminar</button>
    </div>`).join("");
  return `<div class="card">
    <h2>Participantes registrados (${users.length})</h2>
    <p class="hint">Eliminar un jugador borra su cuenta y sus pronósticos de ambos torneos. No se puede deshacer.</p>
    ${rows||'<div class="empty">No hay participantes registrados.</div>'}
  </div>`;
}
function renderAdminUserEditor(){
  const t=STATE.tournament;
  const users=allUsersList();
  if(!users.length) return `<div class="card"><h2>Editar apuestas de un jugador</h2><p class="hint">Todavía no hay participantes registrados.</p></div>`;
  const selUser=STATE._adminEditUser&&users.some(u=>u.name===STATE._adminEditUser)?STATE._adminEditUser:users[0].name;
  STATE._adminEditUser=selUser;
  const bracket=STATE.brackets[t];
  const pred=loadMyPrediction(t,selUser);
  let anySeries=false;
  let cardsHtml="";
  TOURNEYS[t].rounds.forEach(r=>{
    const seriesList=bracket[r.key].filter(s=>s.home&&s.away);
    if(!seriesList.length) return;
    anySeries=true;
    const cards=seriesList.map(s=>{
      const id=r.key+"-"+s.id, p=pred.entries[id]||{};
      const opts=`<option value="">— elegir —</option><option value="${esc(s.home)}" ${p.clasificado===s.home?"selected":""}>${esc(s.home)}</option><option value="${esc(s.away)}" ${p.clasificado===s.away?"selected":""}>${esc(s.away)}</option>`;
      let legsHtml;
      if(r.vuelta){
        legsHtml=`
          <div class="leg"><span class="leg-label">🏠 IDA — Local: ${esc(s.home)}</span>
            <div class="score-pair">
              <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="idaH" value="${p.idaH??''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="idaA" value="${p.idaA??''}">
            </div>
          </div>
          <div class="leg"><span class="leg-label">🏠 VUELTA — Local: ${esc(s.away)}</span>
            <div class="score-pair">
              <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="vueltaH" value="${p.vueltaH??''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="vueltaA" value="${p.vueltaA??''}">
            </div>
          </div>`;
      }else{
        legsHtml=`<div class="leg"><span class="leg-label">⚽ Partido único</span>
          <div class="score-pair">
            <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="unicoH" value="${p.unicoH??''}">
            <span class="score-dash">–</span>
            <input type="number" min="0" class="score-box ainp" data-id="${id}" data-field="unicoA" value="${p.unicoA??''}">
          </div>
        </div>`;
      }
      return `<div class="matchup">
        <div class="match-header"><div class="match-title">${esc(s.home)} vs ${esc(s.away)}</div></div>
        ${legsHtml}
        <div class="leg"><span class="leg-label">¿Quién clasifica?</span><select class="clas ainp" data-id="${id}" data-field="clasificado">${opts}</select></div>
      </div>`;
    }).join("");
    cardsHtml+=`<div class="card"><h3 style="font-family:var(--mono);font-size:12px;color:var(--gold-bright);text-transform:uppercase">${r.label}</h3>${cards}</div>`;
  });
  return `<div class="card">
    <h2>Editar apuestas de un jugador — ${TOURNEYS[t].label}</h2>
    <p class="hint">Esto sobreescribe directamente los pronósticos guardados de la persona elegida, sin restricciones de fecha ni de resultados ya cargados. Ideal para corregir errores de carga.</p>
    <div class="field-group" style="max-width:280px;margin-bottom:6px">
      <span>Jugador</span>
      <select ${inp()} onchange="adminPickEditUser(this.value)">
        ${users.map(u=>`<option value="${esc(u.name)}" ${u.name===selUser?"selected":""}>${esc(u.name)}</option>`).join("")}
      </select>
    </div>
    ${anySeries?"":'<div class="empty">No hay equipos cargados en el cuadro todavía.</div>'}
    ${cardsHtml}
    ${anySeries?`<div class="btn-row"><button class="btn" onclick="saveUserPredsAsAdmin('${esc(selUser).replace(/'/g,"\\'")}')">Guardar cambios de ${esc(selUser)}</button></div>`:""}
  </div>`;
}
function renderAdminConsolidated(){
  const t=STATE.tournament;
  const bracket=STATE.brackets[t];
  const users=allUsersList();
  if(!users.length) return `<div class="card"><h2>Consolidado de apuestas</h2><p class="hint">No hay participantes todavía.</p></div>`;
  let seriesCols=[];
  TOURNEYS[t].rounds.forEach(r=>{
    bracket[r.key].filter(s=>s.home&&s.away).forEach(s=>{ seriesCols.push({id:r.key+"-"+s.id,round:r,s}); });
  });
  if(!seriesCols.length) return `<div class="card"><h2>Consolidado de apuestas</h2><p class="hint">No hay llaves con equipos cargados todavía.</p></div>`;
  const headHtml=seriesCols.map(c=>`<th>${esc(c.s.home.split(" ")[0])} vs ${esc(c.s.away.split(" ")[0])}</th>`).join("");
  const rowsHtml=users.map(u=>{
    const pred=loadMyPrediction(t,u.name);
    const cells=seriesCols.map(c=>{
      const p=pred.entries[c.id];
      if(!p) return `<td class="muted">—</td>`;
      let txt;
      if(c.round.vuelta) txt=`${p.idaH??"?"}-${p.idaA??"?"} / ${p.vueltaH??"?"}-${p.vueltaA??"?"}`;
      else txt=`${p.unicoH??"?"}-${p.unicoA??"?"}`;
      if(p.clasificado) txt+=` · ${p.clasificado.split(" ")[0]}`;
      return `<td class="muted" style="white-space:nowrap">${esc(txt)}</td>`;
    }).join("");
    return `<tr><td><b>${esc(u.name)}</b></td>${cells}</tr>`;
  }).join("");
  return `<div class="card">
    <h2>Consolidado de apuestas — ${TOURNEYS[t].label}</h2>
    <p class="hint">Vista rápida de lo que pronosticó cada participante en cada llave (ida / vuelta · clasificado).</p>
    <div style="overflow-x:auto"><table><thead><tr><th>Jugador</th>${headHtml}</tr></thead><tbody>${rowsHtml}</tbody></table></div>
  </div>`;
}
function setPhaseStatus(t,roundKey,status){
  const data=STATE.phaseStatus[t]||{};
  data[roundKey]=status;
  savePhaseStatus(t,data); toast("Estado actualizado"); renderTab();
}

/* =====================================================================
   TAB: TABLA
   ===================================================================== */
function renderTabla(){
  STATE.allPreds=STATE.allPreds||{};
  STATE.allPreds.CL=loadAllPredictions("CL");
  STATE.allPreds.CS=loadAllPredictions("CS");
  const clRows=computeLeaderboard("CL"), csRows=computeLeaderboard("CS");
  const combinedMap={};
  clRows.forEach(r=>{ const k=r.name.toLowerCase(); combinedMap[k]=combinedMap[k]||{name:r.name,total:0}; combinedMap[k].total+=r.total; });
  csRows.forEach(r=>{ const k=r.name.toLowerCase(); combinedMap[k]=combinedMap[k]||{name:r.name,total:0}; combinedMap[k].total+=r.total; });
  const combined=Object.values(combinedMap).sort((a,b)=>b.total-a.total);
  const thead=`<thead><tr><th>#</th><th>Participante</th><th>Puntos</th><th>Exactos</th><th>Clasif.</th><th>Semis+Final</th><th>Dif. gol</th></tr></thead>`;
  const mkRows=rows=>rows.length?rows.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(r.name)}</td><td><b>${r.total.toFixed(2)}</b></td><td class="muted">${r.exact}</td><td class="muted">${r.clasOk}</td><td class="muted">${r.semiFinalPts.toFixed(2)}</td><td class="muted">${r.diffOk}</td></tr>`).join(""):`<tr><td colspan="7" class="empty">Sin datos todavía.</td></tr>`;
  const comb3=combined.length?combined.map((r,i)=>`<tr><td class="rank">${i+1}</td><td>${esc(r.name)}</td><td><b>${r.total.toFixed(2)}</b></td></tr>`).join(""):`<tr><td colspan="3" class="empty">Sin datos todavía.</td></tr>`;
  return `
    <div class="card"><h2>1. Ranking Copa Libertadores</h2><p class="hint">Desempate: exactos → clasificados → puntos semis/final → diferencias de gol. Si sigue el empate, premio compartido.</p><table>${thead}<tbody>${mkRows(clRows)}</tbody></table></div>
    <div class="card"><h2>2. Ranking Copa Sudamericana</h2><p class="hint">Incluye la Fase Previa (×1). Mismo criterio de desempate.</p><table>${thead}<tbody>${mkRows(csRows)}</tbody></table></div>
    <div class="card"><h2>3. Ranking combinado</h2><p class="hint">Suma el puntaje de ambos torneos por participante.</p><table><thead><tr><th>#</th><th>Participante</th><th>Puntos totales</th></tr></thead><tbody>${comb3}</tbody></table></div>`;
}

/* =====================================================================
   TAB: REGLAS
   ===================================================================== */
function renderReglas(){
  return `<div class="card">
    <h2>Sistema de puntuación</h2>
    <ul class="rules-list">
      <li><b>Marcador de ida</b> (máx. 8 pts): marcador exacto <code class="k">8</code> · ganador/empate correcto <code class="k">4</code> · misma diferencia de goles (sin ganador correcto) <code class="k">2</code>. Se evalúa en ese orden y se entrega el mayor puntaje que aplique.</li>
      <li>Ejemplo: pronóstico 2-0, resultado 3-1 → ambos son triunfo del local, así que se cuenta como <b>ganador correcto</b> (4 pts), no como diferencia de gol.</li>
      <li><b>Marcador de vuelta</b>: igual que la ida, máx. 8 pts.</li>
      <li><b>Equipo que clasifica</b>: <code class="k">10</code> pts (vale por 90', alargue o penales).</li>
      <li><b>Bonus llave perfecta</b>: ida exacta + vuelta exacta + clasificado correcto → <code class="k">+5</code> pts extra.</li>
      <li><b>Final (partido único)</b>: marcador único (máx. 8) + campeón (10) + bonus si ambos exactos (+5).</li>
      <li><b>Puntaje máximo por llave</b>: 8 + 8 + 10 + 5 = <code class="k">31 pts</code> (antes del multiplicador).</li>
    </ul>
    <h2 style="margin-top:16px">Multiplicador por fase</h2>
    <ul class="rules-list">
      <li>Fase Previa (solo Sudamericana): <code class="k">×1</code></li>
      <li>Octavos: <code class="k">×1</code></li>
      <li>Cuartos: <code class="k">×1.25</code></li>
      <li>Semifinal: <code class="k">×1.5</code></li>
      <li>Final: <code class="k">×2</code></li>
    </ul>
    <h2 style="margin-top:16px">Localía por seed</h2>
    <ul class="rules-list">
      <li>En cada llave, el equipo con el <b>seed más alto</b> (número mayor) juega de local en la <b>ida</b> y de visitante en la <b>vuelta</b>. Ej: Boca Juniors (#21) vs O'Higgins (#12) → Ida: Boca vs O'Higgins · Vuelta: O'Higgins vs Boca.</li>
    </ul>
    <h2 style="margin-top:16px">Desempates</h2>
    <ul class="rules-list">
      <li>1° Más marcadores exactos · 2° Más clasificados acertados · 3° Más puntos en semis+final · 4° Más diferencias de gol acertadas · Si sigue el empate: premio compartido.</li>
    </ul>
    <h2 style="margin-top:16px">Restricción de fechas</h2>
    <ul class="rules-list">
      <li>Una vez que arranca el primer partido de una fase, los pronósticos quedan bloqueados. Se desbloquea la siguiente fase cuando el admin carga el último resultado de la fase actual.</li>
      <li>El admin puede forzar apertura/cierre manual de cualquier fase desde ⚙ Admin.</li>
    </ul>
    <h2 style="margin-top:16px">Cuentas</h2>
    <ul class="rules-list">
      <li>Cada participante se registra con <b>nombre y contraseña</b>. Si olvidás la contraseña, pedíle al administrador que te la restablezca desde ⚙ Admin.</li>
      <li>Solo puede existir <b>1 administrador</b> por instalación. Los datos se guardan en el navegador (localStorage) y persisten entre sesiones en el mismo dispositivo.</li>
    </ul>
    <h2 style="margin-top:16px">Fechas oficiales 2026</h2>
    <ul class="rules-list">
      <li><b>Libertadores:</b> Octavos 11–20 ago · Cuartos 8–17 sep · Semifinal 14–22 oct · Final 28 nov — Centenario, Montevideo.</li>
      <li><b>Sudamericana:</b> Fase Previa 21–30 jul · Octavos 11–20 ago · Cuartos 8–17 sep · Semifinal 13–21 oct · Final 21 nov — Metropolitano, Barranquilla.</li>
    </ul>
  </div>`;
}

   INIT

  initCloud();
}
init();
