<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polla CONMEBOL 2026</title>
<style>
  :root{
    --pitch:#0d3b2e;
    --pitch-deep:#082a20;
    --pitch-line:#124a39;
    --chalk:#eef2ea;
    --chalk-dim:#c7d2c8;
    --gold:#c9a227;
    --gold-bright:#e7c65a;
    --ink:#0a1712;
    --line: rgba(238,242,234,.14);
    --red:#b23a2e;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans);
    color:var(--chalk);
    background:
      repeating-linear-gradient(180deg, rgba(255,255,255,0.015) 0 2px, transparent 2px 60px),
      linear-gradient(180deg, var(--pitch-deep), var(--pitch) 40%, var(--pitch-deep));
    min-height:100vh;
  }
  .shell{max-width:1100px;margin:0 auto;padding:20px 16px 80px;}

  /* HERO */
  .hero{padding:28px 4px 10px;}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.25em;text-transform:uppercase;color:var(--gold-bright);opacity:.85;}
  h1{
    font-size:clamp(28px,5vw,44px);
    line-height:1.02;
    margin:6px 0 4px;
    font-weight:800;
    letter-spacing:-.01em;
    text-transform:uppercase;
    background:linear-gradient(180deg,var(--chalk),var(--chalk-dim));
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .sub{color:var(--chalk-dim);font-size:14.5px;max-width:620px;margin:0 0 18px;}

  /* STAKES LADDER - signature element */
  .ladder{display:flex;align-items:flex-end;gap:0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px 0;margin-bottom:22px;overflow-x:auto;}
  .rung{flex:1;text-align:center;position:relative;padding:0 6px;white-space:nowrap;}
  .rung:not(:last-child)::after{content:"";position:absolute;right:0;top:50%;width:1px;height:22px;background:var(--line);transform:translateY(-50%);}
  .rung .name{display:block;font-family:var(--mono);text-transform:uppercase;letter-spacing:.14em;color:var(--chalk-dim);}
  .rung .mult{display:block;font-weight:800;color:var(--gold);font-family:var(--mono);}
  .rung:nth-child(1) .name{font-size:10px;} .rung:nth-child(1) .mult{font-size:15px;opacity:.55;}
  .rung:nth-child(2) .name{font-size:10.5px;} .rung:nth-child(2) .mult{font-size:18px;opacity:.7;}
  .rung:nth-child(3) .name{font-size:11px;} .rung:nth-child(3) .mult{font-size:22px;opacity:.85;color:var(--gold-bright);}
  .rung:nth-child(4) .name{font-size:12px;} .rung:nth-child(4) .mult{font-size:28px;color:var(--gold-bright);text-shadow:0 0 14px rgba(231,198,90,.5);}

  /* IDENTITY BAR */
  .me-bar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-bottom:18px;}
  .me-bar label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--chalk-dim);}
  .me-bar input{background:var(--ink);border:1px solid var(--line);color:var(--chalk);padding:7px 10px;border-radius:7px;font-size:14px;min-width:140px;}
  .me-bar .tag{margin-left:auto;font-size:12px;color:var(--chalk-dim);}
  .me-bar .whoami{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .me-bar .whoami b{color:var(--gold-bright);}
  .field-group{display:flex;flex-direction:column;gap:3px;}
  .field-group span{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--chalk-dim);}

  /* ADMIN */
  .phase-row{display:flex;flex-wrap:wrap;align-items:center;gap:10px;background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:8px;}
  .phase-row .pname{font-weight:700;min-width:190px;}
  .phase-row .pstatus{font-family:var(--mono);font-size:11.5px;color:var(--chalk-dim);flex:1;min-width:200px;}
  .seg{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .seg button{
    font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.05em;
    background:transparent;border:none;color:var(--chalk-dim);padding:7px 10px;cursor:pointer;
  }
  .seg button + button{border-left:1px solid var(--line);}
  .seg button.on{background:var(--gold);color:var(--ink);font-weight:700;}
  .auth-card{max-width:420px;}
  .readonly-note{background:rgba(178,58,46,.12);border:1px solid var(--red);color:var(--chalk);padding:10px 12px;border-radius:9px;font-size:13px;margin-bottom:14px;}

  /* TABS */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .tab{
    font-family:var(--mono);font-size:12px;letter-spacing:.06em;text-transform:uppercase;
    background:transparent;border:1px solid var(--line);color:var(--chalk-dim);
    padding:9px 14px;border-radius:999px;cursor:pointer;transition:.15s;
  }
  .tab:hover{border-color:var(--gold);color:var(--chalk);}
  .tab.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:700;}

  /* TOURNAMENT TOGGLE */
  .tsel{display:flex;gap:8px;margin-bottom:18px;}
  .tsel button{
    flex:1;padding:12px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.15);
    color:var(--chalk-dim);cursor:pointer;font-weight:700;letter-spacing:.02em;
  }
  .tsel button.on{background:linear-gradient(180deg, var(--pitch-line), rgba(0,0,0,.1));border-color:var(--gold);color:var(--chalk);box-shadow:inset 0 0 0 1px rgba(201,162,39,.3);}
  .tsel button small{display:block;font-family:var(--mono);font-weight:400;font-size:10px;color:var(--gold-bright);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}

  /* CARDS */
  .card{background:rgba(0,0,0,.18);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px;}
  .card h2{margin:0 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:.12em;color:var(--gold-bright);font-family:var(--mono);}
  .card .hint{color:var(--chalk-dim);font-size:12.5px;margin:0 0 12px;}

  /* BRACKET */
  .bracket-cols{display:flex;gap:14px;overflow-x:auto;padding-bottom:6px;}
  .bcol{min-width:220px;flex:1;}
  .bcol h3{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--chalk-dim);margin:0 0 4px;}
  .bcol .dates{font-size:11px;color:var(--gold-bright);opacity:.85;margin-bottom:10px;font-family:var(--mono);}
  .series{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:9px;padding:10px;margin-bottom:22px;}
  .series .row{display:flex;align-items:center;gap:6px;margin-bottom:4px;}
  .series input.team{flex:1;background:var(--ink);border:1px solid var(--line);color:var(--chalk);padding:6px 8px;border-radius:6px;font-size:13px;}
  .series .vs{text-align:center;font-family:var(--mono);font-size:10px;color:var(--chalk-dim);opacity:.6;margin:2px 0;}
  .series .actual{font-family:var(--mono);font-size:12px;color:var(--gold-bright);margin-top:6px;}

  .btn{
    font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.06em;
    background:var(--gold);color:var(--ink);border:none;padding:9px 16px;border-radius:8px;cursor:pointer;font-weight:700;
  }
  .btn:hover{background:var(--gold-bright);}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--chalk-dim);}
  .btn.ghost:hover{border-color:var(--red);color:var(--chalk);}
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}

  /* MATCH PREDICTION / RESULT FORM */
  .matchup{background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:12px;}
  .matchup .teams{display:flex;justify-content:space-between;align-items:center;font-weight:700;margin-bottom:10px;font-size:14.5px;}
  .matchup .teams .vsx{font-family:var(--mono);color:var(--chalk-dim);font-size:11px;font-weight:400;}
  .leg{margin-bottom:10px;}
  .leg .leg-label{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;color:var(--chalk-dim);letter-spacing:.08em;margin-bottom:6px;display:block;}
  .score-pair{display:flex;align-items:center;gap:8px;}
  .score-box{
    width:56px;text-align:center;background:var(--ink);border:1px solid var(--gold);color:var(--gold-bright);
    font-family:var(--mono);font-size:20px;font-weight:700;border-radius:8px;padding:8px 0;
  }
  .score-dash{font-family:var(--mono);color:var(--chalk-dim);font-size:18px;}
  select.clas{width:100%;background:var(--ink);border:1px solid var(--line);color:var(--chalk);padding:8px;border-radius:7px;font-size:13.5px;}
  .locked{opacity:.7;}
  .locked .score-box, .locked select{border-color:var(--line);color:var(--chalk-dim);}
  .points-pill{display:inline-block;margin-top:8px;background:rgba(201,162,39,.16);border:1px solid var(--gold);color:var(--gold-bright);font-family:var(--mono);font-size:12px;padding:4px 10px;border-radius:999px;}
  .penales{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--chalk-dim);margin-top:6px;}

  /* TABLE */
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  th{font-family:var(--mono);text-transform:uppercase;font-size:10.5px;letter-spacing:.06em;color:var(--gold-bright);text-align:left;padding:8px 6px;border-bottom:1px solid var(--line);}
  td{padding:9px 6px;border-bottom:1px solid var(--line);color:var(--chalk);}
  tr:first-child td{font-weight:700;}
  .rank{font-family:var(--mono);color:var(--gold-bright);}
  .muted{color:var(--chalk-dim);font-size:12px;}

  .empty{padding:30px 10px;text-align:center;color:var(--chalk-dim);font-size:13.5px;}
  .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--gold);color:var(--ink);
    padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.35);
    opacity:0;pointer-events:none;transition:.25s;z-index:99;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

  .rules-list{padding-left:18px;margin:6px 0;}
  .rules-list li{margin-bottom:6px;line-height:1.5;color:var(--chalk-dim);font-size:13.5px;}
  .rules-list b{color:var(--chalk);}
  code.k{font-family:var(--mono);background:rgba(0,0,0,.25);padding:1px 6px;border-radius:5px;color:var(--gold-bright);}

  footer{margin-top:30px;padding-top:14px;border-top:1px solid var(--line);color:var(--chalk-dim);font-size:11.5px;text-align:center;}

  @media (max-width:640px){
    .bracket-cols{flex-direction:column;}
    .bcol{min-width:0;}
  }
</style>
</head>
<body>
<div class="shell" id="app">Cargando…</div>
<div class="toast" id="toast"></div>

<script>
/* ======================= CONFIG ======================= */
const TOURNEYS = {
  CL: {
    label:"Copa Libertadores",
    short:"Libertadores",
    rounds:[
      {key:"octavos",   label:"Octavos de Final", mult:1,    n:8, vuelta:true,  dates:{ida:"11–13 de agosto 2026", vuelta:"18–20 de agosto 2026"}, startDate:"2026-08-11"},
      {key:"cuartos",   label:"Cuartos de Final", mult:1.25, n:4, vuelta:true,  dates:{ida:"8–10 de septiembre 2026", vuelta:"15–17 de septiembre 2026"}, startDate:"2026-09-08"},
      {key:"semifinal", label:"Semifinal",        mult:1.5,  n:2, vuelta:true,  dates:{ida:"14–15 de octubre 2026", vuelta:"21–22 de octubre 2026"}, startDate:"2026-10-14"},
      {key:"final",     label:"Final",            mult:2,    n:1, vuelta:false, dates:{unico:"28 de noviembre 2026 · Estadio Centenario, Montevideo"}, startDate:"2026-11-28"}
    ]
  },
  CS: {
    label:"Copa Sudamericana",
    short:"Sudamericana",
    rounds:[
      {key:"previa",    label:"Fase Previa (Playoff de Octavos)", mult:1, n:8, vuelta:true, dates:{ida:"21–23 de julio 2026", vuelta:"28–30 de julio 2026"}, startDate:"2026-07-21"},
      {key:"octavos",   label:"Octavos de Final", mult:1,    n:8, vuelta:true,  dates:{ida:"11–13 de agosto 2026", vuelta:"18–20 de agosto 2026"}, startDate:"2026-08-11"},
      {key:"cuartos",   label:"Cuartos de Final", mult:1.25, n:4, vuelta:true,  dates:{ida:"8–10 de septiembre 2026", vuelta:"15–17 de septiembre 2026"}, startDate:"2026-09-08"},
      {key:"semifinal", label:"Semifinal",        mult:1.5,  n:2, vuelta:true,  dates:{ida:"13–14 de octubre 2026", vuelta:"20–21 de octubre 2026"}, startDate:"2026-10-13"},
      {key:"final",     label:"Final",            mult:2,    n:1, vuelta:false, dates:{unico:"21 de noviembre 2026 · Estadio Metropolitano, Barranquilla"}, startDate:"2026-11-21"}
    ]
  }
};
const ROUND_ORDER = ["previa","octavos","cuartos","semifinal","final"];

/* ¿Ya arrancó una fase? (bloquea pronósticos aunque el resultado real no esté cargado) */
function phaseLocked(round){
  if(!round.startDate) return false;
  const start = new Date(round.startDate+"T00:00:00");
  return new Date() >= start;
}

/* Estado manual de apuestas por fase: 'auto' (según fecha), 'open' (forzada abierta), 'closed' (forzada cerrada) */
async function ensurePhaseStatus(t){
  let raw = await sGet("phasestatus:"+t, true);
  let parsed = {};
  if(raw){ try{ parsed = JSON.parse(raw); }catch(e){ parsed = {}; } }
  let changed = false;
  TOURNEYS[t].rounds.forEach(r=>{ if(!parsed[r.key]){ parsed[r.key]='auto'; changed=true; } });
  if(changed) await sSet("phasestatus:"+t, JSON.stringify(parsed), true);
  return parsed;
}
async function savePhaseStatus(t, data){
  STATE.phaseStatus[t] = data;
  await sSet("phasestatus:"+t, JSON.stringify(data), true);
}
function isRoundLocked(t, round){
  const status = (STATE.phaseStatus[t]||{})[round.key] || 'auto';
  if(status==='open') return false;
  if(status==='closed') return true;
  return phaseLocked(round);
}
function roundStatusLabel(t, round){
  const status = (STATE.phaseStatus[t]||{})[round.key] || 'auto';
  if(status==='open') return '🟢 Forzada ABIERTA por el admin';
  if(status==='closed') return '🔒 Forzada CERRADA por el admin';
  return phaseLocked(round) ? '🔒 Cerrada automáticamente (ya comenzó)' : '🟢 Abierta (automático, según fecha)';
}

/* ======================= STATE ======================= */
let STATE = {
  me:"",
  realName:"",
  loggedIn:false,
  isAdmin:false,
  tournament:"CL",
  tab:"cuadro",
  brackets:{CL:null, CS:null},
  results:{CL:null, CS:null},
  phaseStatus:{CL:null, CS:null},
};
const TAB_KEYS = ["cuadro","pronosticar","resultados","tabla","reglas","admin"];

/* ======================= STORAGE HELPERS ======================= */
async function sGet(key, shared){
  try{
    const r = await window.storage.get(key, !!shared);
    return r ? r.value : null;
  }catch(e){ return null; }
}
async function sSet(key, value, shared){
  try{
    await window.storage.set(key, value, !!shared);
    return true;
  }catch(e){ console.error("storage set failed", key, e); return false; }
}
async function sList(prefix, shared){
  try{
    const r = await window.storage.list(prefix, !!shared);
    return (r && r.keys) ? r.keys : [];
  }catch(e){ return []; }
}

function slug(name){
  return (name||"").trim().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"") || "anon";
}

/* ======================= AUTENTICACIÓN DE PARTICIPANTES ======================= */
/* Cada participante se identifica con: nombre real, apodo en la apuesta, correo y contraseña.
   Esto es solo para evitar malos entendidos entre amigos (que alguien cambie el
   pronóstico de otro sin querer) — no es un sistema de seguridad robusto.
   IMPORTANTE: este archivo no tiene servidor propio, así que no puede enviar correos
   automáticos por sí mismo. La "recuperación por correo" arma un borrador de e-mail
   (mailto:) hacia el correo registrado, que la propia persona debe enviar (o reenviar)
   desde su cliente de correo. */
function mailtoReminder(email, nick, password){
  const subject = encodeURIComponent("Recordatorio de contraseña — Polla CONMEBOL 2026");
  const body = encodeURIComponent(`Hola ${nick},\n\nEste es tu recordatorio de acceso a la Polla CONMEBOL 2026:\n\nApodo: ${nick}\nContraseña: ${password}\n\nSi no lo solicitaste tú, avísale a quien organiza la polla.`);
  window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
}

async function userAuth(){
  const real = document.getElementById("regReal").value.trim();
  const nick = document.getElementById("regNick").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pass = document.getElementById("regPass").value;
  if(!nick || !pass){ toast("Completa tu apodo y tu contraseña"); return; }
  const key = "user:"+slug(nick);
  const raw = await sGet(key, true);
  if(raw){
    let existing; try{ existing = JSON.parse(raw); }catch(e){ existing=null; }
    if(!existing || existing.password !== pass){ toast("Ese apodo ya existe y la contraseña no coincide"); return; }
    STATE.me = existing.nick; STATE.realName = existing.realName; STATE.loggedIn = true;
    // completa el correo si la cuenta es anterior a esta función y todavía no lo tenía
    if(!existing.email && email){ existing.email = email; await sSet(key, JSON.stringify(existing), true); }
    toast(`Hola de nuevo, ${STATE.me}`);
  }else{
    if(!real){ toast("Escribe tu nombre real para crear tu cuenta"); return; }
    if(!email){ toast("Escribe tu correo electrónico: lo vas a necesitar para recuperar tu contraseña"); return; }
    const data = {nick, realName:real, email, password:pass};
    await sSet(key, JSON.stringify(data), true);
    STATE.me = nick; STATE.realName = real; STATE.loggedIn = true;
    toast(`Cuenta creada. ¡Bienvenido, ${nick}!`);
  }
  await sSet("session", JSON.stringify({nick:STATE.me, realName:STATE.realName}), false);
  await render();
}
async function userLogout(){
  STATE.me=""; STATE.realName=""; STATE.loggedIn=false;
  await sSet("session","", false);
  toast("Sesión cerrada");
  await render();
}
async function forgotUserPassword(){
  const nick = document.getElementById("forgotNick").value.trim();
  if(!nick){ toast("Escribe tu apodo"); return; }
  const key = "user:"+slug(nick);
  const raw = await sGet(key, true);
  if(!raw){ toast("No existe ninguna cuenta con ese apodo"); return; }
  let existing; try{ existing = JSON.parse(raw); }catch(e){ existing=null; }
  if(!existing){ toast("No se pudo leer esa cuenta"); return; }
  if(!existing.email){ toast("Esa cuenta no tiene correo registrado — pídele al administrador que te restablezca la contraseña"); return; }
  mailtoReminder(existing.email, existing.nick, existing.password);
  toast(`Se abrió un borrador de correo hacia ${existing.email}`);
}
function toggleForgotUser(){
  const el = document.getElementById("forgotUserBox");
  if(el) el.style.display = el.style.display==="none" ? "flex" : "none";
}

/* ======================= AUTENTICACIÓN DE ADMINISTRADOR ======================= */
/* Un único administrador por grupo, con una contraseña compartida que controla
   quién puede editar el cuadro, cargar resultados, restablecer contraseñas de
   participantes y abrir/cerrar apuestas por fase. */
async function adminSetup(){
  const email = document.getElementById("adminEmailSetup").value.trim();
  const p1 = document.getElementById("adminPass1").value;
  const p2 = document.getElementById("adminPass2").value;
  if(!email){ toast("Escribe un correo: lo vas a necesitar para recuperar la contraseña de administrador"); return; }
  if(!p1 || p1.length<4){ toast("La contraseña debe tener al menos 4 caracteres"); return; }
  if(p1!==p2){ toast("Las contraseñas no coinciden"); return; }
  await sSet("adminPassword", p1, true);
  await sSet("adminEmail", email, true);
  STATE.isAdmin = true;
  await sSet("adminUnlocked","1", false);
  toast("Contraseña de administrador creada");
  await render();
}
async function adminLogin(){
  const pass = document.getElementById("adminPassInput").value;
  const real = await sGet("adminPassword", true);
  if(pass && real && pass===real){
    STATE.isAdmin = true;
    await sSet("adminUnlocked","1", false);
    toast("Sesión de administrador iniciada");
  }else{
    toast("Contraseña incorrecta");
  }
  await render();
}
async function adminLogout(){
  STATE.isAdmin = false;
  await sSet("adminUnlocked","", false);
  toast("Sesión de administrador cerrada");
  await render();
}
async function forgotAdminPassword(){
  const email = await sGet("adminEmail", true);
  const pass = await sGet("adminPassword", true);
  if(!email){ toast("Todavía no hay un correo de administrador registrado"); return; }
  mailtoReminder(email, "Administrador", pass);
  toast(`Se abrió un borrador de correo hacia ${email}`);
}
/* El admin restablece la contraseña de un participante sin necesitar la anterior */
async function adminResetUserPassword(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede hacer esto"); return; }
  const nick = document.getElementById("resetNick").value.trim();
  const newPass = document.getElementById("resetNewPass").value;
  if(!nick || !newPass){ toast("Completa el apodo y la nueva contraseña"); return; }
  const key = "user:"+slug(nick);
  const raw = await sGet(key, true);
  if(!raw){ toast("No existe ninguna cuenta con ese apodo"); return; }

/* ======================= BRACKET / RESULTS DEFAULTS ======================= */
/* Tabla de seeds (orden oficial 1..N) y llaves de Octavos/Fase Previa según
   lo indicado por el organizador. Regla: en cada llave, el equipo con el
   número MAYOR juega de local en la ida (el de número menor juega de local
   en la vuelta). Esa misma regla se respeta automáticamente al avanzar de
   ronda (cuartos, semifinal, final): entre los dos clasificados, el que
   tenía el número de seed más alto en su ronda anterior arranca de local. */
const CL_SEEDS = {
  1:"Flamengo", 2:"Independiente Rivadavia", 3:"Independiente del Valle", 4:"Universidad Católica",
  5:"Cerro Porteño", 6:"Liga de Quito", 7:"Corinthians", 8:"Coquimbo Unido",
  9:"Rosario Central", 10:"Mirassol", 11:"Palmeiras", 12:"Cruzeiro",
  13:"Platense", 14:"Estudiantes (LP)", 15:"Deportes Tolima", 16:"Fluminense"
};
// Confirmado por el organizador: 4 vs 14, 7 vs 9, 1 vs 12, 3 vs 15, 6 vs 10, 5 vs 11, 8 vs 13, 2 vs 16
const CL_OCTAVOS_PAIRS = [[4,14],[7,9],[1,12],[3,15],[6,10],[5,11],[8,13],[2,16]];

const CS_SEEDS = {
  1:"Botafogo", 2:"River Plate", 3:"Montevideo City Torque", 4:"Olimpia",
  5:"São Paulo", 6:"Macará", 7:"Atlético Mineiro", 8:"Recoleta",
  9:"Grêmio", 10:"Bragantino", 11:"Vasco da Gama", 12:"O'Higgins",
  13:"Tigre", 14:"Caracas", 15:"Cienciano", 16:"Santos",
  17:"Universidad Central", 18:"Lanús", 19:"Santa Fe", 20:"Nacional",
  21:"Boca Juniors", 22:"Independiente Medellín", 23:"Sporting Cristal", 24:"Bolívar"
};
// Confirmado por el organizador: 12 vs 21, 9 vs 24, 14 vs 19, 11 vs 22, 10 vs 23, 16 vs 17, 13 vs 20, 15 vs 18
const CS_PREVIA_PAIRS = [[12,21],[9,24],[14,19],[11,22],[10,23],[16,17],[13,20],[15,18]];
// A qué seed (1..8, clasificado directo a Octavos) se enfrenta el ganador de cada llave de la Fase Previa, en el mismo orden que CS_PREVIA_PAIRS
const CS_PREVIA_FACES = [8,5,2,4,7,6,3,1];

function buildSeedSeries(pairs, seedsMap){
  return pairs.map(([a,b])=>{
    const hi = Math.max(a,b), lo = Math.min(a,b); // el de mayor número juega de local en la ida
    return {home:seedsMap[hi]||"", away:seedsMap[lo]||"", homeSeed:hi, awaySeed:lo};
  });
}

function defaultBracket(t){
  const b = {};
  TOURNEYS[t].rounds.forEach(r=>{
    b[r.key] = Array.from({length:r.n}, (_,i)=>({id:i, home:"", away:"", homeSeed:null, awaySeed:null}));
  });
  if(t==="CL"){
    const seeded = buildSeedSeries(CL_OCTAVOS_PAIRS, CL_SEEDS);
    seeded.forEach((s,i)=>{ b.octavos[i] = {id:i, ...s}; });
  }
  if(t==="CS"){
    const seededPrevia = buildSeedSeries(CS_PREVIA_PAIRS, CS_SEEDS);
    seededPrevia.forEach((s,i)=>{ b.previa[i] = {id:i, ...s}; });
    // Octavos: el lado del clasificado directo (seed 1-8) ya se conoce; el otro lado se completa
    // cuando termine la Fase Previa (a mano, o con el botón "Avanzar Fase Previa → Octavos").
    CS_PREVIA_FACES.forEach((topSeed,i)=>{
      b.octavos[i] = {id:i, home:"", away:CS_SEEDS[topSeed], homeSeed:null, awaySeed:topSeed};
    });
  }
  return b;
}

/* Devuelve {name, seed} del clasificado real de una llave ya jugada, o null si todavía no tiene resultado */
function winnerOf(t, roundKey, seriesId){
  const results = STATE.results[t] || {};
  const bracket = STATE.brackets[t];
  const s = (bracket[roundKey]||[]).find(x=>x.id===seriesId);
  const act = results[roundKey+"-"+seriesId];
  if(!s || !act || !act.clasificado) return null;
  if(act.clasificado === s.home) return {name:s.home, seed:s.homeSeed};
  if(act.clasificado === s.away) return {name:s.away, seed:s.awaySeed};
  return {name:act.clasificado, seed:null};
}

/* Recarga SOLO Octavos (y la Fase Previa en Sudamericana) con la tabla de seeds oficial,
   sin tocar Cuartos/Semifinal/Final ni los resultados ya cargados. Útil si el cuadro
   ya se había guardado antes con datos viejos o incompletos. */
async function reseedOctavos(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede recargar el cuadro"); return; }
  const t = STATE.tournament;
  const bracket = STATE.brackets[t];
  if(t==="CL"){
    const seeded = buildSeedSeries(CL_OCTAVOS_PAIRS, CL_SEEDS);
    bracket.octavos = seeded.map((s,i)=>({id:i, ...s}));
  }else{
    const seededPrevia = buildSeedSeries(CS_PREVIA_PAIRS, CS_SEEDS);
    bracket.previa = seededPrevia.map((s,i)=>({id:i, ...s}));
    CS_PREVIA_FACES.forEach((topSeed,i)=>{
      bracket.octavos[i] = {id:i, home:"", away:CS_SEEDS[topSeed], homeSeed:null, awaySeed:topSeed};
    });
  }
  await saveBracket(t, bracket);
  toast("Octavos recargado con los equipos oficiales");
  await renderTab();
}

async function ensureBracket(t){

  try{ parsed = JSON.parse(raw); }catch(e){ parsed = defaultBracket(t); }
  // migración: si se agregó una ronda nueva (ej. Fase Previa) a un torneo ya guardado, completarla
  let changed = false;
  TOURNEYS[t].rounds.forEach(r=>{

  return parsed;
}

/* ======================= SCORING ======================= */
function matchPoints(ph,pa,ah,aa){
  if(ph===null||pa===null||ah===undefined||ah===null||aa===null) return 0;
  if(ph===ah && pa===aa) return 8;
  const pd = ph-pa, ad = ah-aa;
  if(pd===ad) return 2;
  const sgn = x => x>0?1:(x<0?-1:0);
  if(sgn(pd)===sgn(ad)) return 4;
  return 0;
}

// Returns {total, exact, clasOk, diffOk, perfect} contribution for one series
function scoreSeries(round, pred, act){
  if(!pred || !act) return null;
  const out = {ida:0, vuelta:0, clas:0, perfect:0, exactCount:0, diffCount:0};
  if(round.vuelta){
    if(act.idaH==null||act.idaA==null||act.vueltaH==null||act.vueltaA==null||!act.clasificado) return null;
    out.ida = matchPoints(pred.idaH,pred.idaA,act.idaH,act.idaA);
    out.vuelta = matchPoints(pred.vueltaH,pred.vueltaA,act.vueltaH,act.vueltaA);
    if(out.ida===8) out.exactCount++;
    if(out.vuelta===8) out.exactCount++;
    if(out.ida===2) out.diffCount++;
    if(out.vuelta===2) out.diffCount++;
    out.clas = (pred.clasificado && act.clasificado && pred.clasificado.trim().toLowerCase()===act.clasificado.trim().toLowerCase()) ? 10 : 0;
    out.perfect = (out.ida===8 && out.vuelta===8 && out.clas===10) ? 5 : 0;
  }else{
    if(act.unicoH==null||act.unicoA==null||!act.clasificado) return null;
    out.ida = matchPoints(pred.unicoH,pred.unicoA,act.unicoH,act.unicoA);
    if(out.ida===8) out.exactCount++;
    if(out.ida===2) out.diffCount++;
    out.clas = (pred.clasificado && act.clasificado && pred.clasificado.trim().toLowerCase()===act.clasificado.trim().toLowerCase()) ? 10 : 0;
    out.perfect = (out.ida===8 && out.clas===10) ? 5 : 0;
  }
  const base = out.ida + out.vuelta + out.clas + out.perfect;
  out.total = base * round.mult;
  out.clasOk = out.clas>0 ? 1:0;
  return out;
}

function computeLeaderboard(t){
  const bracket = STATE.brackets[t];
  const results = STATE.results[t] || {};
  const rounds = TOURNEYS[t].rounds;
  const rows = (STATE.allPreds[t]||[]).map(p=>{
    let total=0, exact=0, clasOk=0, diffOk=0, semiFinalPts=0;
    rounds.forEach(r=>{
      (bracket[r.key]||[]).forEach(series=>{
        const id = r.key+"-"+series.id;
        const pred = p.entries[id];
        const act = results[id];
        const sc = scoreSeries(r, pred, act);
        if(sc){
          total += sc.total;
          exact += sc.exactCount;
          clasOk += sc.clasOk;
          diffOk += sc.diffCount;
          if(r.key==="semifinal"||r.key==="final") semiFinalPts += sc.total;
        }
      });
    });
    return {name:p.displayName||"(sin nombre)", total, exact, clasOk, diffOk, semiFinalPts};
  });
  rows.sort((a,b)=>
    b.total-a.total ||
    b.exact-a.exact ||
    b.clasOk-a.clasOk ||
    b.semiFinalPts-a.semiFinalPts ||
    b.diffOk-a.diffOk
  );
  return rows;
}

const NEXT_ROUND = {octavos:"cuartos", cuartos:"semifinal", semifinal:"final"};
async function advanceRound(fromKey){
  if(!STATE.isAdmin){ toast("Solo el administrador puede avanzar el cuadro"); return; }
  const t = STATE.tournament;
  const toKey = NEXT_ROUND[fromKey];
  const bracket = STATE.brackets[t];
  const fromSeries = bracket[fromKey];
  const toSeries = bracket[toKey];
  let missing = 0;
  for(let i=0;i<toSeries.length;i++){
    const s1 = fromSeries[i*2], s2 = fromSeries[i*2+1];
    const w1 = winnerOf(t, fromKey, s1.id);
    const w2 = winnerOf(t, fromKey, s2.id);
    if(!w1 || !w2){ missing++; continue; }
    // el equipo con el número de seed más alto arranca de local (ida)
    const seed1 = w1.seed==null ? -1 : w1.seed, seed2 = w2.seed==null ? -1 : w2.seed;
    const homeW = seed1>=seed2 ? w1 : w2;
    const awayW = seed1>=seed2 ? w2 : w1;
    toSeries[i].home = homeW.name; toSeries[i].homeSeed = homeW.seed;
    toSeries[i].away = awayW.name; toSeries[i].awaySeed = awayW.seed;
  }
  if(missing){ toast(`Faltan resultados de ${missing} llave(s) anterior(es) para completar el avance`); }
  await saveBracket(t, bracket);
  toast("Cuadro actualizado con los clasificados");
  await renderTab();
}
async function advancePreviaToOctavos(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede avanzar el cuadro"); return; }
  const t = "CS";
  const bracket = STATE.brackets[t];
  let missing = 0;
  CS_PREVIA_FACES.forEach((topSeed, i)=>{
    const w = winnerOf(t, "previa", i);
    if(!w){ missing++; return; }
    const idx = bracket.octavos.findIndex(s=>s.awaySeed===topSeed);
    if(idx>=0){ bracket.octavos[idx].home = w.name; bracket.octavos[idx].homeSeed = w.seed; }
  });
  if(missing){ toast(`Faltan resultados de ${missing} llave(s) de la Fase Previa`); }
  await saveBracket(t, bracket);
  toast("Octavos actualizado con los clasificados de la Fase Previa");
  await renderTab();
}

  let html = `<div class="card"><h2>Tus pronósticos — ${TOURNEYS[t].label}</h2><p class="hint">Marcador de ida, marcador de vuelta (si aplica) y quién clasifica. Una vez que arranca la fase o se carga el resultado real de una llave, tu pronóstico queda bloqueado.</p></div>`;

  rounds.forEach(r=>{
    const seriesList = bracket[r.key].filter(s=>s.home && s.away);
    if(!seriesList.length) return;
    anySeries = true;
    const cards = seriesList.map(s=>{
      const id = r.key+"-"+s.id;
      const act = results[id];
      const resultDone = !!(act && ((r.vuelta && act.idaH!=null && act.vueltaH!=null && act.clasificado) || (!r.vuelta && act.unicoH!=null && act.clasificado)));
      const dateLocked = isRoundLocked(t, r) && !resultDone;
      const locked = resultDone || dateLocked;
      const pred = myPred.entries[id] || {};
      const opts = `<option value="">— elegir —</option><option value="${esc(s.home)}" ${pred.clasificado===s.home?'selected':''}>${esc(s.home)}</option><option value="${esc(s.away)}" ${pred.clasificado===s.away?'selected':''}>${esc(s.away)}</option>`;

      let legsHtml = "";
      if(r.vuelta){
        legsHtml = `
          <div class="leg"><span class="leg-label">Ida</span>
            <div class="score-pair">
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="idaH" ${locked?'disabled':''} value="${pred.idaH ?? ''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="idaA" ${locked?'disabled':''} value="${pred.idaA ?? ''}">
            </div>
          </div>
          <div class="leg"><span class="leg-label">Vuelta</span>
            <div class="score-pair">
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="vueltaH" ${locked?'disabled':''} value="${pred.vueltaH ?? ''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="vueltaA" ${locked?'disabled':''} value="${pred.vueltaA ?? ''}">
            </div>
          </div>`;
      }else{
        legsHtml = `
          <div class="leg"><span class="leg-label">Partido único</span>
            <div class="score-pair">
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="unicoH" ${locked?'disabled':''} value="${pred.unicoH ?? ''}">
              <span class="score-dash">–</span>
              <input type="number" min="0" class="score-box pinp" data-id="${id}" data-field="unicoA" ${locked?'disabled':''} value="${pred.unicoA ?? ''}">
            </div>
          </div>`;
      }

      let pointsPill = "";
      if(resultDone){
        const sc = scoreSeries(r, pred, act);
        if(sc) pointsPill = `<div class="points-pill">Ganaste ${sc.total} pts en esta llave</div>`;
        else pointsPill = `<div class="points-pill">No pronosticaste esta llave</div>`;
      }else if(dateLocked){
        pointsPill = `<div class="points-pill">🔒 Apuestas cerradas para esta llave (${roundStatusLabel(t,r).replace(/^\S+\s/,'')})</div>`;
      }

      return `
        <div class="matchup ${locked?'locked':''}">
          <div class="teams"><span>${esc(s.home)}</span><span class="vsx">VS</span><span>${esc(s.away)}</span></div>
          ${legsHtml}
          <div class="leg"><span class="leg-label">¿Quién clasifica?</span>
            <select class="clas pinp" data-id="${id}" data-field="clasificado" ${locked?'disabled':''}>${opts}</select>
          </div>
          ${pointsPill}
        </div>`;
    }).join("");
    html += `<div class="card"><h2>${r.label}</h2>${cards}</div>`;
  });

  if(!anySeries){
    html += `<div class="empty">Todavía no hay equipos cargados en el cuadro. Pídele al organizador que complete la pestaña "Cuadro".</div>`;
  }else{
    html += `<div class="btn-row"><button class="btn" onclick="saveMyPreds()">Guardar mis pronósticos</button></div>`;
  }
  return html;
}
async function saveMyPreds(){
  if(!STATE.loggedIn){ toast("Inicia sesión primero"); return; }
  const t = STATE.tournament;
  const myPred = STATE._myPred || {displayName:STATE.me, entries:{}};
  myPred.displayName = STATE.me;
  document.querySelectorAll('#tabContent .pinp').forEach(inp=>{
    const id = inp.dataset.id, field = inp.dataset.field;
    if(!myPred.entries[id]) myPred.entries[id] = {};
    if(inp.tagName==="SELECT"){
      myPred.entries[id][field] = inp.value || null;
    }else{
      myPred.entries[id][field] = inp.value===""? null : parseInt(inp.value,10);
    }
  });
  await saveMyPrediction(t, STATE.me, myPred);
  toast("Pronósticos guardados");
  await renderTab();
}

async function saveResultsForm(){
  if(!STATE.isAdmin){ toast("Solo el administrador puede cargar resultados"); return; }
  const t = STATE.tournament;
  const results = JSON.parse(JSON.stringify(STATE.results[t] || {}));
  document.querySelectorAll('#tabContent .rinp').forEach(inp=>{
    const id = inp.dataset.id, field = inp.dataset.field;
    if(!results[id]) results[id] = {};
    if(inp.type==="checkbox"){
      results[id][field] = inp.checked;
    }else if(inp.tagName==="SELECT"){
      results[id][field] = inp.value || null;
    }else{
      results[id][field] = inp.value===""? null : parseInt(inp.value,10);
    }
  });
  await saveResults(t, results);
  toast("Resultados guardados");
  await renderTab();

/* ======================= INIT ======================= */
async function init(){
  const sessionRaw = await sGet("session", false);
  if(sessionRaw){
    try{
      const s = JSON.parse(sessionRaw);
      if(s && s.nick){ STATE.me = s.nick; STATE.realName = s.realName || ""; STATE.loggedIn = true; }
    }catch(e){}
  }
  STATE.isAdmin = (await sGet("adminUnlocked", false)) === "1";

  STATE.brackets.CL = await ensureBracket("CL");
  STATE.brackets.CS = await ensureBracket("CS");
  STATE.results.CL = await ensureResults("CL");
  STATE.results.CS = await ensureResults("CS");
